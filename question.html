<!DOCTYPE html>
<html>
<head>
  <title>Important Question ❤️</title>
  <link rel="stylesheet" href="design.css">
</head>

<body>

  <div class="container">

    <h1>I have a question for you 😌</h1>

    <p>Do you love me? ❤️</p>

    <button onclick="yes()">Yes obviously 💖</button>
    <button id="noBtn">No 😒</button>

  </div>

  <script>
    function yes() {
      window.location.href = "love.html";
    }

    const noBtn = document.getElementById("noBtn");

    const funnyMessages = [
      "Nice try 😏",
      "You can't say no to me 😌",
      "Be honest... it's me right? 😍",
      "Come on... press YES 💖",
      "I know you want to 😄"
    ];

    noBtn.addEventListener("mouseover", () => {
      let x = Math.random() * (window.innerWidth - 100);
      let y = Math.random() * (window.innerHeight - 50);

      noBtn.style.position = "absolute";
      noBtn.style.left = x + "px";
      noBtn.style.top = y + "px";

      alert(funnyMessages[Math.floor(Math.random() * funnyMessages.length)]);
    });
  </script>

</body>
</html>
